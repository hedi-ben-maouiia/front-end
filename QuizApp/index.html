<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Quiz</title>
        <link href="main.css" rel="stylesheet">
        <script src="quiz.js"></script>
    </head>
    <body>
        <div class="container">
            <div class="screen active" id="start-screen">
                <h1>Quiz Time!</h1>
                <p>Test your knowledge with these fun quistions</p>
                <button class="start-btn" id="start-btn">Start Quiz</button>
            </div> 

            <div class="screen" id="quiz-screen">
                <h2 class="quistion-txt">Quistion goes here!</h2>  
                <div class="question-info">
                    <p>Quistion <span>1</span> of <span>5</span></p> 
                    <p>Score <span>1</span></p>
                </div>
                <ul class="quistions-list">
                   <li>Quistion 1</li> 
                   <li>Quistion 2</li> 
                   <li>Quistion 3</li> 
                   <li>Quistion 4</li> 
                </ul>
            </div> 
        </div> 
    </body>
</html>
