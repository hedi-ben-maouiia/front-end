<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Quiz</title>
        <link href="style.css" rel="stylesheet">
        <script src="script.js" defer></script>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        </style>
    </head>
    <body>
        <div class="container">

            <div class="screen active" id="start-screen">
                <h1>Quiz Time!</h1>
                <p>Test your knowledge with these fun questions</p>
                <button class="start-btn" id="start-btn">Start Quiz</button>
            </div> 

            <div class="screen" id="quiz-screen">
                <h1 class="question-txt" id="question-txt"></h1>
                <div class="question-info">
                    <p>Question <span id="question-number">1</span> of <span id="question-total">5</span></p> 
                    <p>Score: <span id="score">1</span></p>
                </div>
                <div class="answers-container" id="answers-container">
                   <!-- Answers goes here!  -->

                </div>
                <div class="progress-bar">
                   <div class="bar">
                   </div> 
                </div>
            </div> 

            <div class="screen" id="result-screen">
                <h1>Quiz Results</h1>                
                <div class="result-info">
                    <p>You scored <span id="final-score">1</span> of <span id="total-score">5</span></p> 
                    <p>Good Job!</p> 
                </div>
                <button class="restart-btn" id="restart-btn">Restart Quiz</button>
            </div>

        </div> 
    </body>
</html>
