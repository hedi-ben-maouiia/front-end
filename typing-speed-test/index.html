<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->


        <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
        <link rel="stylesheet" href="style.css">

        <title>Frontend Mentor | Typing Speed Test</title>

    </head>
    <body>
        <div class="container">
            <header class="header">
                <picture class="logo">
                    <source srcset="./assets/images/logo-large.svg" media="(width > 375px)">
                    <img src="./assets/images/logo-small.svg" alt=""> 
                </picture>
                <p class="best-score">Best: <span id="best-score">92 WPM</span> </p> 
            </header>

            <main class="main-content"> 
                <nav>        
                    <div class="current-info">
                        <p>WPM: <span>0</span></p>
                        <p>Accuracy: <span>100%</span></p>
                        <p>Time: <span>0:60</span></p>    
                    </div>
                    <div class="difficulty-levels">
                        <p class="level">Hard</p>
                        <p class="mode">Timed(60s)</p>
                    </div>
                </nav>
                <section class="typing-text">
                    <p>
                        Text Goes here!
                    </p>      
                    <div class="start-typing">
                        <button>Start Typing Test</button>  
                        <p>Or click the text and start typing</p>
                    </div>
                </section>
            </main>

        </div>

        <!-- Passage -->

</html>
